<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PV=nRT 理想氣體互動演示</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Left Panel: 3D Visualization -->
        <div class="panel left-panel">
            <header style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h1>理想氣體三維關係圖 (PV=nRT)</h1>
                    <p>1 莫耳理想氣體之 P-V-T 關係表面</p>
                </div>
                <a href="water.html" class="nav-link">進入：水的相圖互動演示 →</a>
            </header>
            <div id="plot3d" class="chart-container"></div>
            <div class="info-overlay">
                <div class="info-item">
                    <span class="label">狀態方程式:</span>
                    <span class="value">PV = nRT</span>
                </div>
            </div>
        </div>

        <!-- Right Panel: 2D Projections and Controls -->
        <div class="panel right-panel">
            <!-- Top: P-V Plot -->
            <div class="sub-panel">
                <div class="chart-header">
                    <h2>等溫線剖面 (P-V 圖)</h2>
                    <div class="control-group">
                        <label for="temp-slider">溫度 (T): <span id="temp-val">300</span> K</label>
                        <input type="range" id="temp-slider" min="100" max="600" value="300" step="10">
                    </div>
                </div>
                <div id="plot-pv" class="chart-container-small"></div>
            </div>

            <!-- Middle: V-T Plot -->
            <div class="sub-panel">
                <div class="chart-header">
                    <h2>等壓線剖面 (V-T 圖)</h2>
                    <div class="control-group">
                        <label for="pres-slider">壓力 (P): <span id="pres-val">1.0</span> atm</label>
                        <input type="range" id="pres-slider" min="0.1" max="10" value="1.0" step="0.1">
                    </div>
                </div>
                <div id="plot-vt" class="chart-container-small"></div>
            </div>

            <!-- Bottom: P-T Plot -->
            <div class="sub-panel">
                <div class="chart-header">
                    <h2>等容線剖面 (P-T 圖)</h2>
                    <div class="control-group">
                        <label for="vol-slider">體積 (V): <span id="vol-val">24.6</span> L</label>
                        <input type="range" id="vol-slider" min="0.5" max="50" value="24.6" step="0.1">
                    </div>
                </div>
                <div id="plot-pt" class="chart-container-small"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        document.body.addEventListener('click', function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            }
        });
    </script>
</body>
</html>
